# CI is the merge gate: nothing lands on main without this workflow green
# (DECISIONS.md). `pnpm test` at the root runs the same set locally.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgres://postgres:fm@localhost:5432/fm_test

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm boundaries

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit

  server-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: fm
          POSTGRES_DB: fm_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:server

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:web

  harness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # 3 fixed master seeds, n=600 each; exits non-zero on any band miss
      - run: pnpm harness
      # realism + growth REGRESSION TRIPWIRES against the committed fixture
      # pool (engine/harness-fixture.json). The authoritative acceptance runs
      # are the real-pool locals (pnpm realism / pnpm growth) — the real pool
      # needs the human-populated cache CSV, which stays uncommitted.
      - run: pnpm realism:ci
      - run: pnpm growth:ci

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: fm
          POSTGRES_DB: fm_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: schema + state-machine guard tests
        env:
          PGPASSWORD: fm
        run: |
          psql -h localhost -U postgres -c 'CREATE DATABASE smoke_test'
          psql -h localhost -U postgres -d smoke_test -v ON_ERROR_STOP=1 -q -f server/schema.sql
          psql -h localhost -U postgres -d smoke_test -v ON_ERROR_STOP=1 -q -f server/smoke.sql

  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r pipeline/requirements.txt
      # transform-layer tests only — fixtures on disk, no network
      - run: python -m pytest pipeline/tests -q
